<!DOCTYPE html>
<html lang="en-Us">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="White Water Rafting Adventures - Contact us Now.">
    <meta name="author" content="Jed van Eeden">
    <title>Contact Us - White Water Rafting Adventures</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>
    <header>
        <img src="images/wwrpfp.jpg" alt="White Water Rafting Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>

        </nav>
    </header>


    <main>
        <h1>White Water Rafting Company</h1>
        <h2>123 Main River Street</h2>
        <h2>Niagara Falls, New York</h2>
        <h2>+1 999 999 9999</h2>
        <h2>info@whitewater.com</h2>

        <form>
            <fieldset>
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <input type="radio" id="html" name="general_inquiry" value="HTML">
                <label for="html">General Inquiry</label><br>
                <input type="radio" id="html" name="reservation_question" value="HTML">
                <label for="html">Reservation Question</label>
                <input type="radio" id="html" name="website_suggestion" value="HTML">
                <label for="html">Website Suggestion</label>

                <label for="feedback">Message</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Type Here"></textarea>

                <label><input type="checkbox" id="checkbox" name="checkbox">Please Subscribe me to
                    the monthly newsletter</label>

                <button type="submit">Submit poll</button>
            </fieldset>
        </form>

        <section class="serve">
            <h2>We Are Here To Serve You!</h2>
            <figure><img src="images/helmet.jpg" alt="rafting equipment on raft">
                <figcaption>Rafting Equipment</figcaption>
            </figure>
            <figure><img src="images/twoboats.jpg" alt="two rafts on the shore">
                <figcaption>Two rafts on shore</figcaption>
            </figure>
            <figure><img src="images/splashing.jpg" alt="rafters braving the rough rapids">
                <figcaption>Rafters braving the rough rapids</figcaption>
            </figure>
            <figure><img src="images/wide.jpg" alt="wideshot of the river and mountains">
                <figcaption>Wide shot of the river and scenery</figcaption>
            </figure>
            <figure><img src="images/rapids.jpg" alt="rafters rowing down the rapids">
                <figcaption>Rafters going down rapids</figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>&copy;2026 White Water Rafting Adventures. All rights reserved. Jed van Eeden</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-icon.jpg" alt="Facebook icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-icon.jpg" alt="Linkedin icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instragram-icon.jpg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
