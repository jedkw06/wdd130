<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poll Form</title>
  <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Contact Information:</legend>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <legend>Questions:</legend>
        <label for="quantity">Whats Your favorite Browser?</label>
        <select id="quantity" name="quantity">
          <option value="1">Safari</option>
          <option value="2">Brave</option>
          <option value="3">Other</option>
        </select>

        <label><input type="checkbox" id="checkbox" name="checkbox"> Do you have an animal?</label>

        <label for="feedback">List of the places you have lived:</label>
        <textarea id="feedback" name="feedback" rows="4"
          placeholder="Cape Town, Johannesburg, Durban, Pretoria"></textarea>

        <button type="submit">Submit poll</button>
      </fieldset>

    </form>
  </main>
